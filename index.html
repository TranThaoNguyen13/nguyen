<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pi❤️nguyên</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    width:100vw;
    height:100vh;
    font-family:Arial, Helvetica, sans-serif;
}

.text{
    position:absolute;
    top:-100px;
    color:#ff4d88;
    font-weight:bold;
    text-shadow:
        0 0 10px #fff,
        0 0 20px #ff4d88,
        0 0 40px #ff4d88;
    white-space:nowrap;
    pointer-events:none;
    animation:fall linear forwards;
}

@keyframes fall{
    0%{
        transform:translateY(-100px) rotate(0deg);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:translateY(120vh) rotate(360deg);
        opacity:1;
    }
}
</style>

</head>
<body>

<script>

function createText(){

    const text=document.createElement("div");

    text.className="text";

    text.innerHTML="pi❤️nguyên";

    text.style.left=Math.random()*window.innerWidth+"px";

    text.style.fontSize=(28+Math.random()*32)+"px";

    text.style.animationDuration=(3+Math.random()*4)+"s";

    text.style.opacity=Math.random()*0.5+0.5;

    document.body.appendChild(text);

    setTimeout(()=>{
        text.remove();
    },7000);

}

// Tạo sẵn 80 chữ khi mở trang
for(let i=0;i<80;i++){
    setTimeout(createText,i*50);
}

// Sau đó cứ 80ms tạo thêm 1 chữ
setInterval(createText,80);

</script>

</body>
</html>
