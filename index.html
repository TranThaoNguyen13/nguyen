<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pi❤️nguyên</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:radial-gradient(circle,#1a0012,#000);
width:100vw;
height:100vh;
font-family:Arial,sans-serif;
}

.text{

position:absolute;
top:-120px;
font-weight:bold;
color:#ff4da6;
white-space:nowrap;
pointer-events:none;

text-shadow:
0 0 8px #fff,
0 0 18px #ff4da6,
0 0 35px #ff0080,
0 0 60px #ff0080;

animation:fall linear forwards;

}

.heart{

position:absolute;
top:-80px;
pointer-events:none;
animation:fall linear forwards;

filter:drop-shadow(0 0 8px #ff4da6);

}

@keyframes fall{

0%{
transform:translateY(-120px) rotate(0deg);
opacity:0;
}

10%{
opacity:1;
}

100%{
transform:translateY(120vh) rotate(360deg);
opacity:1;
}

}

</style>

</head>

<body>

<script>

function createText(){

const div=document.createElement("div");

div.className="text";

div.innerHTML="pi❤️nguyên";

div.style.left=Math.random()*window.innerWidth+"px";

div.style.fontSize=(24+Math.random()*36)+"px";

div.style.animationDuration=(4+Math.random()*5)+"s";

div.style.transform=`rotate(${Math.random()*40-20}deg)`;

document.body.appendChild(div);

setTimeout(()=>{

div.remove();

},9000);

}

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML=["❤️","💖","💕","💗"][Math.floor(Math.random()*4)];

heart.style.left=Math.random()*window.innerWidth+"px";

heart.style.fontSize=(20+Math.random()*30)+"px";

heart.style.animationDuration=(4+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},9000);

}

// Hiệu ứng ban đầu

for(let i=0;i<180;i++){

setTimeout(createText,i*35);

}

for(let i=0;i<100;i++){

setTimeout(createHeart,i*60);

}

// Hiệu ứng liên tục

setInterval(createText,40);

setInterval(createHeart,120);

</script>

</body>
</html>
