<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pi❤️nguyên</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    .text {
      position: absolute;
      top: -80px;
      left: 10px;
      color: #ff4d88;
      font-size: 42px;
      font-weight: bold;
      text-shadow: 0 0 10px #ff4d88, 0 0 20px #ff4d88;
      animation: fall 5s linear infinite;
    }

    @keyframes fall {
      from {
        top: -80px;
        left: 10px;
      }
      to {
        top: 100vh;
        left: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="text">pi❤️nguyên</div>
</body>
</html>
