<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pi❤️nguyên</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#000;
    width:100vw;
    height:100vh;
    font-family:Arial,sans-serif;
}

.text{
    position:absolute;
    top:-80px;
    color:#ff5fa2;
    font-weight:bold;
    white-space:nowrap;
    pointer-events:none;

    text-shadow:
        0 0 6px #fff,
        0 0 12px #ff4da6,
        0 0 24px #ff4da6;
}
</style>

</head>
<body>

<script>

const spacing = 120;
const columns = Math.floor(window.innerWidth / spacing);

function createDrop(x){

    const text = document.createElement("div");

    text.className = "text";
    text.innerHTML = "pi❤️nguyên";

    text.style.left = x + "px";
    text.style.fontSize = (28 + Math.random()*10) + "px";

    document.body.appendChild(text);

    let y = -80;

    const speed = 1.4 + Math.random()*1.2;

    function fall(){

        y += speed;

        text.style.top = y + "px";

        text.style.opacity = 1 - (y/window.innerHeight)*0.15;

        if(y < window.innerHeight + 100){

            requestAnimationFrame(fall);

        }else{

            text.remove();

        }

    }

    fall();

}

for(let i=0;i<columns;i++){

    setTimeout(()=>{

        setInterval(()=>{

            createDrop(i*spacing + Math.random()*25);

        },900);

    },Math.random()*900);

}

</script>

</body>
</html>
